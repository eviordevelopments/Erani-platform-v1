[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Redirect all traffic to Next.js — the plugin handles routing,
# but this catches any edge cases for the SPA fallback.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
